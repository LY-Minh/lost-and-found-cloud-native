# EC2-2: claims-service + catalog-service (instance 1)
# ─────────────────────────────────────────────────────────────
services:
  claims-service:
    image: jinn2/lostfound-claims-service:latest
    container_name: claims-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGO_URI=${CLAIMS_DB_URI}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  catalog-service:
    image: jinn2/lostfound-catalog-service:latest
    container_name: catalog-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGO_URI=${CATALOG_DB_URI}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
