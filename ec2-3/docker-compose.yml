# EC2-3: report-service + catalog-service (instance 2)
# ─────────────────────────────────────────────────────────────
# report-service calls catalog-service (co-located) and
# claims-service (on EC2-2).  Docker Compose creates a default
# network so report-service can reach catalog-service at
# http://catalog-service:3002.
services:
  catalog-service:
    image: jinn2/lostfound-catalog-service:latest
    container_name: catalog-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGO_URI=${CATALOG_DB_URI}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  report-service:
    image: jinn2/lostfound-report-service:latest
    container_name: report-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - CATALOG_SERVICE_URL=http://catalog-service:3002
      - CLAIMS_SERVICE_URL=${CLAIMS_SERVICE_URL}
    depends_on:
      - catalog-service
    restart: unless-stopped

