load_module modules/ngx_http_js_module.so;

env JWT_SECRET;

events {
    worker_connections 1024;
}

http {
    js_path /etc/nginx/njs/;
    js_import auth from auth.js;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Upstreams ───────────────────────────────────────────────
    # EC2 IPs (private, same VPC):
    #   EC2-1: 172.31.16.94   (auth-service, api-gateway)
    #   EC2-2: 172.31.20.227  (claims-service, catalog-service instance 1)
    #   EC2-3: 172.31.24.80   (report-service, catalog-service instance 2)
    #   EC2-4: 172.31.22.100  (profile-service, feedback-service)

    upstream catalog_backend {
        server 172.31.20.227:3002;
        server 172.31.24.80:3002;
    }

    upstream auth_backend {
        server 172.31.16.94:3001;
    }

    upstream claims_backend {
        server 172.31.20.227:3003;
    }

    upstream report_backend {
        server 172.31.24.80:3004;
    }

    upstream profile_backend {
        server 172.31.22.100:3005;
    }

    upstream feedback_backend {
        server 172.31.22.100:3006;
    }

    # ─── Internal auth subrequest server (njs) ──────────────────
    # Runs on localhost:8181. The /auth-validate location proxies
    # here. No "internal" directive — that would block proxied
    # subrequests and return 404.
    server {
        listen 127.0.0.1:8181;

        location /auth-check {
            js_content auth.authenticate;
        }
    }

    # ─── Main server ─────────────────────────────────────────────
    server {
        listen 80;

        default_type application/json;

        # ─── Gateway health check ────────────────────────────────
        location = /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
        }

        # ─── Auth Service (open — no token needed) ───────────────
        location /auth/ {
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─── Block external access to /internal/ routes ──────────
        location /internal/ {
            return 403 '{"message":"Access denied. Internal route."}';
        }

        # ═══════════════════════════════════════════════════════════
        # PROTECTED ROUTES — all require auth_request check
        # ═══════════════════════════════════════════════════════════

        # ─── Catalog Service: authenticated routes (any role) ─────
        location /items {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://catalog_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        # ─── Claims Service: authenticated routes (any role) ─────
        location /claims {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://claims_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        # ─── Admin routes: items (catalog-service) ────────────────
        location /admin/items {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://catalog_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        # ─── Admin routes: claims ─────────────────────────────────
        location /admin/claims {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://claims_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        location /admin/approve-claim {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://claims_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        location /admin/reject-claim {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://claims_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        # ─── Admin routes: reports ────────────────────────────────
        location /admin/total-items {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://report_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        location /admin/total-claims {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://report_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        location /admin/pending-claims {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://report_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        location /admin/claims-by-status {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://report_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        # ─── Admin routes: feedback ───────────────────────────────
        location /admin/feedback {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://feedback_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        # ─── Student routes: claims ───────────────────────────────
        location /student/my-claims {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://claims_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        location /student/submit-claim {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://claims_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        # ─── Student routes: profile (profile-service) ───────────
        location /student/me {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://profile_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        location /student/update {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://profile_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        # ─── Student routes: feedback ─────────────────────────────
        location /student/submit-feedback {
            auth_request /auth-validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_pass http://feedback_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;
        }

        # ─── Auth validation subrequest endpoint ──────────────────
        # Proxies to the njs server on port 8181. auth_request_set
        # captures the X-User-* response headers set by auth.js.
        location = /auth-validate {
            internal;
            proxy_pass http://127.0.0.1:8181/auth-check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
