# =============================================================================
# api-gateway — Kubernetes AUTH VALIDATOR (nginx + njs)
# =============================================================================
# In the k8s deployment this container is NOT a proxy. The Ingress does the path
# fanout; this gateway ONLY answers the Ingress `auth-url` subrequest at
# GET /auth-check, where njs (njs/auth.js) verifies the JWT + role and returns
# 200 (allow) or 401/403 (deny). On allow, njs sets X-User-* headers that the
# Ingress copies onto the upstream request (auth-response-headers).
#
# (The previous EC2 version of this file proxied to hardcoded upstreams; that is
#  gone on purpose — see git history if you ever need it.)
# =============================================================================

load_module modules/ngx_http_js_module.so;   # enable the njs module

env JWT_SECRET;                               # pass JWT_SECRET to workers; njs reads process.env.JWT_SECRET

events {
    worker_connections 1024;
}

http {
    js_path   /etc/nginx/njs/;                # where auth.js lives (copied in by the Dockerfile)
    js_import auth from auth.js;              # import njs/auth.js as `auth`

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;                            # matches Dockerfile `EXPOSE 80` + Service targetPort
        default_type application/json;

        # The Ingress calls this for EVERY protected request (auth-url).
        # njs decides allow/deny and, on allow, sets the X-User-* identity headers.
        location = /auth-check {
            js_content auth.authenticate;
        }

        # Liveness/readiness probe target for the Deployment.
        location = /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
        }
    }
}
