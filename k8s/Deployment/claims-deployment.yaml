
apiVersion: apps/v1

kind: Deployment

metadata:
  name: claims-deployment
  labels:
    app: claims

spec:
  replicas: 1

  selector:
    matchLabels:
      app: claims

  template:
    metadata:
      labels:
        app: claims

    spec:
      volumes:
        - name: shared-logs
          persistentVolumeClaim:
            claimName: shared-logs-pvc

      containers:
        - name: claims-container
          image: jinn2/lostfound-claims-service:v1.0

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3002

          volumeMounts:
            - name: shared-logs
              mountPath: /app/logs

          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: claims-secret
                  key: MONGO_URI

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: claims-secret
                  key: JWT_SECRET

            - name: PORT
              value: "3002"

          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5