# CLAIMS SERVICE
# Handles item claims — users submit, admins approve/reject
# Port: 3002
# Ingress path: /claims

apiVersion: apps/v1
kind: Deployment

metadata:
  name: claims-deployment
  labels:
    app: claims

spec:
  replicas: 1

  selector:
    matchLabels:
      app: claims

  template:
    metadata:
      labels:
        app: claims

    spec:
      containers:
        - name: claims-container
          image: smanith/claims-service:v1.0      #change this
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3002

          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: claims-secret
                  key: MONGO_URI

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: claims-secret
                  key: JWT_SECRET

            - name: PORT
              value: "3002"

          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5