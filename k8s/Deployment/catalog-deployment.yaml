apiVersion: apps/v1

kind: Deployment

metadata:
  name: catalog-deployment
  labels:
    app: catalog

spec:
  replicas: 2

  selector:
    matchLabels:
      app: catalog

  template:
    metadata:
      labels:
        app: catalog

    spec:
      volumes:
        - name: shared-logs
          emptyDir: {}

      containers:
        - name: catalog-container
          image: jinn2/lostfound-catalog-service:v1.0

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3001

          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: catalog-secret
                  key: MONGO_URI

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: catalog-secret
                  key: JWT_SECRET

            - name: PORT
              value: "3001"

          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5

          volumeMounts:
            - name: shared-logs
              mountPath: /app/logs

        - name: logger
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - "sh"
            - "-c"
            - |
              while true; do
                echo "=== Catalog Logs ==="
                cat /logs/catalog.log 2>/dev/null || echo "No logs yet"
                sleep 30
              done
          volumeMounts:
            - name: shared-logs
              mountPath: /logs