apiVersion: apps/v1
kind: Deployment

metadata:
  name: logger-deployment
  labels:
    app: logger

spec:
  replicas: 1

  selector:
    matchLabels:
      app: logger

  template:
    metadata:
      labels:
        app: logger

    spec:
      volumes:
        - name: shared-logs
          persistentVolumeClaim:
            claimName: shared-logs-pvc

      containers:
        - name: logger-container
          image: busybox

          imagePullPolicy: IfNotPresent

          command:
            - "sh"
            - "-c"
            - |
              while true; do
                echo "=== Shared Logs ==="
                cat /logs/*.log 2>/dev/null || echo "No logs yet"
                sleep 30
              done

          volumeMounts:
            - name: shared-logs
              mountPath: /logs
              readOnly: true