# CATALOG SERVICE
# Handles lost & found item listings (CRUD operations)
# Replicas: 2 — load balanced
# Port: 3001
# Ingress path: /catalog
#
# SPECIAL: This pod runs 2 containers:
#   1. catalog-container — main application
#   2. logger (sidecar)  — reads shared logs via emptyDir volume

apiVersion: apps/v1
kind: Deployment

metadata:
  name: catalog-deployment
  labels:
    app: catalog

spec:
  replicas: 2

  selector:
    matchLabels:
      app: catalog

  template:
    metadata:
      labels:
        app: catalog

    spec:
      # Shared VOLUME — emptyDir between catalog-container and logger sidecar
      volumes:
        - name: shared-logs
          emptyDir: {}

      containers:

        # MAIN CONTAINER — Catalog Application
        - name: catalog-container
          image: smanith/catalog-service:v1.0      #change this
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3001

          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: catalog-secret
                  key: MONGO_URI

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: catalog-secret
                  key: JWT_SECRET

            - name: PORT
              value: "3001"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5

          # Catalog writes logs to this shared volume
          volumeMounts:
            - name: shared-logs
              mountPath: /app/logs

        # SIDECAR CONTAINER — Logger
        - name: logger
          image: busybox
          imagePullPolicy: IfNotPresent

          command:
            - "sh"
            - "-c"
            - |
              while true; do
                echo "=== Catalog Logs ==="
                cat /logs/catalog.log 2>/dev/null || echo "No logs yet"
                sleep 30
              done

          # Logger reads logs from the same shared volume
          volumeMounts:
            - name: shared-logs
              mountPath: /logs