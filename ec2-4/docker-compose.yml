# EC2-4: profile-service + feedback-service
# ─────────────────────────────────────────────────────────────
services:
  profile-service:
    image: jinn2/lostfound-profile-service:latest
    container_name: profile-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - MONGO_URI=${PROFILE_DB_URI}
    restart: unless-stopped

  feedback-service:
    image: jinn2/lostfound-feedback-service:latest
    container_name: feedback-service
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - PORT=3006
      - MONGO_URI=${FEEDBACK_DB_URI}
    restart: unless-stopped

